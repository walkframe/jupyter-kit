name: e2e
on:
  push:

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "24.1.0"

      - name: install pnpm
        uses: pnpm/action-setup@v4

      - name: get pnpm store path
        id: pnpm-cache
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: install
        run: |
          pnpm install
          pnpm --filter @jupyter-kit/e2e exec playwright install --with-deps chromium

      - name: build workspace packages
        # Storybook and the e2e suite consume `@jupyter-kit/*` via their
        # published entry (`./dist/...`), so every workspace package must be
        # built before `storybook build` can resolve imports.
        run: pnpm build

      - name: build storybook static
        run: pnpm storybook:build

      - name: run e2e
        # playwright.config.ts starts its own `pnpm exec serve` against
        # storybook-static on port 6007, so we don't need to run a server
        # here — `reuseExistingServer: !CI` forces a fresh spawn on CI.
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: packages/e2e/test-results
