name: release

on:
  push:
    branches:
      - master
      - fix/*
    tags:
      - "v*/*"

permissions:
  id-token: write # Required for npm trusted publishing (OIDC) / --provenance
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tests:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: install
        run: pnpm install
      - name: test
        run: pnpm test

  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    name: npm publish
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - name: remove authToken from .npmrc
        run: |
          NPM_RC=$(npm config get userconfig)
          sed -i '/_authToken/d' "$NPM_RC" 2>/dev/null || true

      - name: install
        run: pnpm install

      # Build theme first so packages/theme/dist-publish/theme-*/ is fresh.
      # The CSS is generated from packages/theme/less/ via build.mjs and is
      # what release-all.sh ships as the @jupyter-kit/theme-* npm packages.
      - name: build theme (regenerate CSS + dist-publish/theme-*)
        run: pnpm --filter @jupyter-kit/theme run build

      - name: build remaining packages
        run: pnpm -r --filter "./packages/*" --filter "!@jupyter-kit/theme" run build

      - name: publish all public packages
        run: pnpm release
